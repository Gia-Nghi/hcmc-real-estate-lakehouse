  collector-osm:
    image: python:3.11-slim
    container_name: hcmre-collector-osm
    depends_on:
      - minio
    working_dir: /app
    environment:
      PYTHONPATH: /app
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: lakehouse
      LOG_LEVEL: INFO
      OSM_ENTITY: all
    volumes:
      - ./workspace:/app
    command: >
      sh -c "pip install --no-cache-dir -r /app/requirements/ingestion.txt &&
            python /app/ingestion/geo_context/osm/runners/run_osm.py"
    networks:
      - lakehouse-net

  validate-bronze:
    image: python:3.11-slim
    container_name: hcmre-validate-bronze
    depends_on:
      - minio
    working_dir: /app
    environment:
      PYTHONPATH: /app
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: lakehouse
    volumes:
      - ./workspace:/app
    command: >
      sh -c "pip install --no-cache-dir minio &&
             python /app/processing/bronze_validation/validate_bronze.py"
    networks:
      - lakehouse-net

volumes:
  minio-data:
  postgres-db-volume:

networks:
  lakehouse-net:
    driver: bridge